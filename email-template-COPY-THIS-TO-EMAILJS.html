<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lưu bút</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
        }
        .wrapper {
            width: 100%;
            table-layout: fixed;
            background-color: #000000;
            padding-bottom: 40px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #09090b;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            overflow: hidden;
        }
        .header-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
            background: linear-gradient(135deg, #18181b 0%, #27272a 100%);
        }
        .content-box {
            padding: 40px;
            text-align: center;
        }
        .meta-date {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #71717a;
            margin-bottom: 30px;
            display: inline-block;
            border-bottom: 1px solid #27272a;
            padding-bottom: 5px;
        }
        .post-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 15px 0;
            color: #ffffff;
            line-height: 1.3;
        }
        .author-info {
            margin-bottom: 40px;
            text-align: center;
        }
        .author-name {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 18px;
            color: #a1a1aa;
        }
        .author-role {
            font-size: 12px;
            background: rgba(255,255,255,0.1);
            padding: 4px 12px;
            border-radius: 20px;
            color: #e4e4e7;
            display: inline-block;
            margin-top: 5px;
        }
        .message-body {
            text-align: left;
            font-size: 16px;
            line-height: 1.8;
            color: #d4d4d8;
            background: rgba(255,255,255,0.03);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .message-body p {
            margin-top: 0;
        }
        .footer {
            font-size: 12px;
            color: #52525b;
            border-top: 1px solid #27272a;
            padding-top: 20px;
            margin-top: 20px;
        }
        /* Mobile responsive */
        @media only screen and (max-width: 600px) {
            .container { width: 100% !important; border: none; border-radius: 0; }
            .content-box { padding: 20px; }
            .post-title { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div style="height: 40px;"></div>
        <div class="container">
            <!-- Decorative Header Block -->
            <div style="background: #18181b; padding: 30px 20px; text-align: center; border-bottom: 1px solid #27272a;">
                <span style="font-family: 'Playfair Display', serif; color: #fff; letter-spacing: 2px; font-size: 24px; font-weight: 700; text-transform: uppercase;">Lưu Bút Online</span>
            </div>

            <div class="content-box">
                <div class="meta-date">{{date_day}} THÁNG {{date_month}}, {{date_year}}</div>

                <h1 class="post-title">{{title}}</h1>

                <div class="author-info" style="text-align: center;">
                    <div class="author-name" style="margin-bottom: 8px;">Gửi bởi: {{name}}</div>
                    <div class="author-role" style="display: inline-block; margin-top: 4px;">{{role}}</div>
                </div>

                <div class="message-body">
                    {{{message}}}
                </div>

                <div class="footer">
                    <p>Được gửi từ hệ thống Lưu bút Online</p>
                    <p>© {{date_year}} @yunkhngn</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
